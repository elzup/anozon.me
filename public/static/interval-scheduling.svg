<svg width="640" height="408" viewBox="0 0 640 408" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <rect x="0" y="0" width="640" height="408" rx="12" fill="#ffffff"/>

  <!-- time guide lines (shared timeline) -->
  <g stroke="#e6e8ec" stroke-width="1">
    <line x1="60"  y1="40" x2="60"  y2="384"/>
    <line x1="190" y1="40" x2="190" y2="384"/>
    <line x1="320" y1="40" x2="320" y2="384"/>
    <line x1="450" y1="40" x2="450" y2="384"/>
    <line x1="580" y1="40" x2="580" y2="384"/>
  </g>
  <g fill="#9aa0a6" font-size="11" text-anchor="middle">
    <text x="60"  y="34">0</text>
    <text x="190" y="34">5</text>
    <text x="320" y="34">10</text>
    <text x="450" y="34">15</text>
    <text x="580" y="34">20</text>
  </g>

  <!-- ===== INPUT ===== -->
  <text x="60" y="20" fill="#202124" font-size="13" font-weight="700">Input — overlapping intervals</text>

  <!-- a 1-10 -->
  <g><rect x="86"  y="48"  width="234" height="22" rx="4" fill="#4C8BF5"/><text x="203" y="63" fill="#fff" font-size="12" font-weight="600" text-anchor="middle">a</text></g>
  <!-- b 5-15 -->
  <g><rect x="190" y="76"  width="260" height="22" rx="4" fill="#34A853"/><text x="320" y="91" fill="#fff" font-size="12" font-weight="600" text-anchor="middle">b</text></g>
  <!-- c 10-20 -->
  <g><rect x="320" y="104" width="260" height="22" rx="4" fill="#FBBC05"/><text x="450" y="119" fill="#5f4b00" font-size="12" font-weight="600" text-anchor="middle">c</text></g>
  <!-- d 12-20 -->
  <g><rect x="372" y="132" width="208" height="22" rx="4" fill="#EA4335"/><text x="476" y="147" fill="#fff" font-size="12" font-weight="600" text-anchor="middle">d</text></g>
  <!-- e 16-17 -->
  <g><rect x="476" y="160" width="26"  height="22" rx="4" fill="#A142F4"/><text x="489" y="175" fill="#fff" font-size="12" font-weight="600" text-anchor="middle">e</text></g>

  <!-- arrow -->
  <text x="320" y="216" fill="#5f6368" font-size="13" font-weight="600" text-anchor="middle">scheduling( )  ↓  pack into the fewest non-overlapping columns</text>

  <!-- ===== OUTPUT ===== -->
  <text x="60" y="252" fill="#202124" font-size="13" font-weight="700">Output — 3 columns</text>

  <!-- col labels -->
  <g fill="#9aa0a6" font-size="11" text-anchor="end">
    <text x="50" y="294">col 1</text>
    <text x="50" y="322">col 2</text>
    <text x="50" y="350">col 3</text>
  </g>

  <!-- col 1: a, c -->
  <g><rect x="86"  y="280" width="234" height="22" rx="4" fill="#4C8BF5"/><text x="203" y="295" fill="#fff" font-size="12" font-weight="600" text-anchor="middle">a</text></g>
  <g><rect x="320" y="280" width="260" height="22" rx="4" fill="#FBBC05"/><text x="450" y="295" fill="#5f4b00" font-size="12" font-weight="600" text-anchor="middle">c</text></g>
  <!-- col 2: b, e -->
  <g><rect x="190" y="308" width="260" height="22" rx="4" fill="#34A853"/><text x="320" y="323" fill="#fff" font-size="12" font-weight="600" text-anchor="middle">b</text></g>
  <g><rect x="476" y="308" width="26"  height="22" rx="4" fill="#A142F4"/><text x="489" y="323" fill="#fff" font-size="12" font-weight="600" text-anchor="middle">e</text></g>
  <!-- col 3: d -->
  <g><rect x="372" y="336" width="208" height="22" rx="4" fill="#EA4335"/><text x="476" y="351" fill="#fff" font-size="12" font-weight="600" text-anchor="middle">d</text></g>
</svg>
